<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BSV Browser — Ready When You Are</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #070f1c 0%, #0e2240 50%, #0a1830 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      /* ── Network graph background ── */
      .network-bg {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 0;
      }

      .network-glow {
        position: absolute;
        width: 60vmin;
        height: 60vmin;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(33, 150, 243, 0.1) 0%, transparent 70%);
        filter: blur(60px);
      }

      .network-svg {
        width: 70vmin;
        height: 70vmin;
        max-width: 600px;
        max-height: 600px;
        color: #2196f3;
        opacity: 0.35;
        animation: network-spin 90s linear infinite;
        filter: drop-shadow(0 0 30px rgba(33, 150, 243, 0.18));
      }

      @keyframes network-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .network-svg {
          animation: none;
        }
      }

      /* ── Foreground content ── */
      .landing-container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px;
        max-width: 800px;
        animation: fadeIn 1s ease-in;
      }

      .landing-container h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 300;
        letter-spacing: -1px;
        color: white;
        margin: 0 0 0.15em;
        line-height: 1;
        animation: slideUp 0.8s ease-out;
      }

      /* ── Cycling word ── */
      .flip-line {
        display: block;
        position: relative;
        height: 1.2em;
        font-size: clamp(3rem, 10vw, 6rem);
        line-height: 1.2;
        letter-spacing: -1px;
      }

      .flip-word {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #64b5f6;
        font-weight: 300;
        opacity: 0;
        animation: word-fade 9s ease infinite;
      }

      .flip-word:nth-child(1) {
        animation-delay: 0s;
      }
      .flip-word:nth-child(2) {
        animation-delay: 3s;
      }
      .flip-word:nth-child(3) {
        animation-delay: 6s;
      }

      /*
        9s total, 3 words -> each owns 33.3%.
        Fade in ~5%, hold ~22%, fade out ~5%.
      */
      @keyframes word-fade {
        0% {
          opacity: 0;
        }
        5% {
          opacity: 1;
        }
        28% {
          opacity: 1;
        }
        33.3% {
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }

      .subtitle {
        font-size: 1.15rem;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 1.5rem;
        font-weight: 300;
        max-width: 520px;
        margin-left: auto;
        margin-right: auto;
        animation: slideUp 0.8s ease-out 0.2s both;
      }

      .arrow-hint {
        position: fixed;
        bottom: 100px;
        right: 80px;
        font-size: 2.5rem;
        color: rgba(255, 255, 255, 0.7);
        animation: bounce 2s infinite;
        cursor: pointer;
        transition: color 0.3s ease;
        z-index: 100;
      }

      .arrow-hint:hover {
        color: rgba(255, 255, 255, 1);
      }

      .arrow-label {
        position: absolute;
        bottom: 60px;
        right: 0;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
        white-space: nowrap;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      @media (max-width: 768px) {
        .landing-container h1 {
          font-size: 2.5rem;
        }

        .flip-wrapper {
          min-width: 4em;
        }

        .subtitle {
          font-size: 1.1rem;
        }

        .arrow-hint {
          bottom: 90px;
          right: 70px;
          font-size: 2rem;
        }

        .arrow-label {
          bottom: 50px;
          font-size: 0.75rem;
        }
      }

      @media (max-width: 480px) {
        .landing-container {
          padding: 20px;
        }

        .landing-container h1 {
          font-size: 2rem;
        }

        .subtitle {
          font-size: 1rem;
        }

        .arrow-hint {
          bottom: 80px;
          right: 60px;
          font-size: 1.8rem;
        }

        .arrow-label {
          bottom: 40px;
          font-size: 0.7rem;
        }
      }
    </style>
    <script>if(localStorage.getItem('bsvb-lang')&&localStorage.getItem('bsvb-lang')!=='en')document.documentElement.classList.add('i18n-loading');</script>

    <script>
      function scrollToNext() {
        // Scroll down to next section
        window.scrollBy({
          top: window.innerHeight,
          behavior: 'smooth'
        })
      }

      // Optional: Add scroll hint after a few seconds
      setTimeout(() => {
        const arrow = document.querySelector('.arrow-hint')
        if (arrow) {
          arrow.style.animation = 'bounce 2s infinite'
        }
      }, 2000)
